<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Innovatieteam — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ro-blauw: #154273;
    --ro-licht-blauw: #007bc7;
    --ro-hemel: #d9eaf7;
    --ro-wit: #ffffff;
    --ro-licht-grijs: #f5f5f5;
    --ro-grijs: #b4b4b4;
    --ro-tekst: #1a1a1a;
    --ro-groen: #39870c;
    --ro-rood: #d52b1e;
    --ro-oranje: #e17000;
  }
  html, body { height: 100%; font-family: 'Source Sans 3', Arial, sans-serif; background: var(--ro-licht-grijs); color: var(--ro-tekst); }
  #root { min-height: 100vh; display: flex; flex-direction: column; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ro-grijs); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const PRODUCTS = [
  {
    id: 'invulhulp',
    name: 'Invulhulp',
    description: 'AI-ondersteunde hulp bij het invullen van formulieren en aanvragen.',
    url: 'https://invulhulp.minfin.nl',
    icon: 'icons/invulhulp_logo.png',
    category: 'Formulieren',
  },
  {
    id: 'opstelhulp',
    name: 'Opstelhulp',
    description: 'Hulp bij het opstellen van brieven, nota\'s en andere documenten.',
    url: null,
    icon: 'icons/opstelhulp_logo.png',
    category: 'Documenten',
  },
  {
    id: 'kasvisie',
    name: 'Kasvisie',
    description: 'Inzicht in kasstromen en financiële prognoses voor de overheid.',
    url: 'https://kasvisie.minfin.nl',
    icon: 'icons/kasvisie_logo.png',
    category: 'Financiën',
  },
  {
    id: 'innovatieplatform',
    name: 'Innovatieplatform',
    description: 'Centraal platform voor het delen en beheren van innovatie-ideeën.',
    url: null,
    icon: 'icons/innovatieplatform_logo.png',
    category: 'Platform',
  },
  {
    id: 'beleidsassistent',
    name: 'Beleidsassistent',
    description: 'AI-assistent die beleidsmakers ondersteunt bij analyses en adviezen.',
    url: null,
    icon: 'icons/beleidsassistent_logo.png',
    category: 'Beleid',
  },
  {
    id: 'finchat',
    name: 'FinChat',
    description: 'Chatbot voor financiële vragen binnen het Ministerie van Financiën.',
    url: null,
    icon: 'icons/finchat_logo.png',
    category: 'Communicatie',
  },
  {
    id: 'annotatietool',
    name: 'Annotatietool',
    description: 'Hulpmiddel voor het annoteren en labelen van documenten en data.',
    url: null,
    icon: 'icons/annotatietool_logo.png',
    category: 'Data',
  },
];

const TEAM = [
  {
    id: 'laurens',
    name: 'Laurens',
    role: 'Engineer',
    initials: 'L',
    color: '#154273',
  },
];

async function pingUrl(url) {
  if (!url) return 'unknown';
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 5000);
  try {
    await fetch(url, { method: 'HEAD', mode: 'no-cors', signal: controller.signal });
    clearTimeout(timeout);
    return 'up';
  } catch (e) {
    clearTimeout(timeout);
    return 'down';
  }
}

function StatusBadge({ status }) {
  const map = {
    up: { label: 'Online', color: 'var(--ro-groen)', dot: '#39870c' },
    down: { label: 'Offline', color: 'var(--ro-rood)', dot: '#d52b1e' },
    checking: { label: 'Controleren…', color: 'var(--ro-oranje)', dot: '#e17000' },
    unknown: { label: 'Onbekend', color: 'var(--ro-grijs)', dot: '#b4b4b4' },
  };
  const s = map[status] || map.unknown;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      fontSize: 13, fontWeight: 600, color: s.color,
    }}>
      <span style={{
        width: 8, height: 8, borderRadius: '50%', background: s.dot,
        boxShadow: status === 'up' ? `0 0 0 3px ${s.dot}30` : 'none',
        animation: status === 'checking' ? 'pulse 1.2s infinite' : 'none',
      }}/>
      {s.label}
    </span>
  );
}

function ProductModal({ product, status, onClose }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(21,66,115,0.45)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 1000, padding: 24, backdropFilter: 'blur(3px)',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: 'white', borderRadius: 4, maxWidth: 480, width: '100%',
        boxShadow: '0 8px 48px rgba(21,66,115,0.18)',
        overflow: 'hidden',
      }}>
        <div style={{ background: 'var(--ro-blauw)', padding: '28px 32px', color: 'white' }}>
          <img src={product.icon} alt={product.name} style={{ width: 64, height: 64, objectFit: 'contain', marginBottom: 12 }}/>
          <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 4 }}>{product.name}</div>
          <div style={{ fontSize: 13, opacity: 0.75, textTransform: 'uppercase', letterSpacing: 1 }}>{product.category}</div>
        </div>
        <div style={{ padding: '28px 32px', display: 'flex', flexDirection: 'column', gap: 20 }}>
          <p style={{ fontSize: 16, lineHeight: 1.6, color: '#333' }}>{product.description}</p>

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '14px 18px', background: 'var(--ro-licht-grijs)', borderRadius: 4,
          }}>
            <span style={{ fontSize: 14, fontWeight: 600, color: '#555' }}>Systeemstatus</span>
            <StatusBadge status={status} />
          </div>

          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            {product.url ? (
              <a href={product.url} target="_blank" rel="noopener noreferrer" style={{
                flex: 1, minWidth: 140,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                background: 'var(--ro-licht-blauw)', color: 'white',
                padding: '12px 20px', borderRadius: 4, textDecoration: 'none',
                fontWeight: 600, fontSize: 15, transition: 'background 0.15s',
              }}
              onMouseEnter={e => e.currentTarget.style.background = '#005f9e'}
              onMouseLeave={e => e.currentTarget.style.background = 'var(--ro-licht-blauw)'}
              >
                ↗ Open tool
              </a>
            ) : (
              <div style={{
                flex: 1, minWidth: 140,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                background: 'var(--ro-grijs)', color: 'white',
                padding: '12px 20px', borderRadius: 4,
                fontWeight: 600, fontSize: 15, cursor: 'not-allowed',
              }}>
                Geen link beschikbaar
              </div>
            )}
            <button onClick={onClose} style={{
              flex: 1, minWidth: 120,
              padding: '12px 20px', borderRadius: 4, border: '2px solid var(--ro-blauw)',
              background: 'transparent', color: 'var(--ro-blauw)',
              fontWeight: 600, fontSize: 15, cursor: 'pointer',
              fontFamily: 'inherit',
            }}
            onMouseEnter={e => { e.currentTarget.style.background = 'var(--ro-blauw)'; e.currentTarget.style.color = 'white'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--ro-blauw)'; }}
            >
              Sluiten
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ProductCard({ product, status, onOpen }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onClick={() => onOpen(product)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: 'white',
        borderRadius: 4,
        border: hover ? '2px solid var(--ro-licht-blauw)' : '2px solid transparent',
        boxShadow: hover ? '0 4px 20px rgba(0,123,199,0.12)' : '0 2px 8px rgba(0,0,0,0.06)',
        cursor: 'pointer',
        transition: 'all 0.18s ease',
        transform: hover ? 'translateY(-2px)' : 'none',
        overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
      }}
    >
      <div style={{ height: 4, background: hover ? 'var(--ro-licht-blauw)' : 'var(--ro-blauw)', transition: 'background 0.18s' }} />

      <div style={{ padding: '22px 24px', flex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
          <img src={product.icon} alt={product.name} style={{ width: 56, height: 56, objectFit: 'contain' }}/>
          <span style={{
            fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1,
            color: 'var(--ro-licht-blauw)', background: 'var(--ro-hemel)',
            padding: '3px 8px', borderRadius: 2,
          }}>{product.category}</span>
        </div>

        <div>
          <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--ro-blauw)', marginBottom: 6 }}>
            {product.name}
          </div>
          <div style={{ fontSize: 14, color: '#555', lineHeight: 1.5 }}>
            {product.description}
          </div>
        </div>

        <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingTop: 12, borderTop: '1px solid #eee' }}>
          <StatusBadge status={status} />
          {product.url
            ? <span style={{ fontSize: 13, color: 'var(--ro-licht-blauw)', fontWeight: 600 }}>Bekijk →</span>
            : <span style={{ fontSize: 13, color: 'var(--ro-grijs)' }}>Binnenkort</span>
          }
        </div>
      </div>
    </div>
  );
}

function TeamMember({ member }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 18,
      background: 'white', borderRadius: 4, padding: '20px 24px',
      boxShadow: '0 2px 8px rgba(0,0,0,0.06)',
      border: '1px solid #e8e8e8',
      minWidth: 200,
    }}>
      <div style={{
        width: 52, height: 52, borderRadius: '50%',
        background: member.color, color: 'white',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 22, fontWeight: 700, flexShrink: 0,
      }}>
        {member.initials}
      </div>
      <div>
        <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--ro-blauw)' }}>{member.name}</div>
        <div style={{ fontSize: 14, color: '#666' }}>{member.role}</div>
      </div>
    </div>
  );
}

function App() {
  const [statuses, setStatuses] = useState(
    () => Object.fromEntries(PRODUCTS.map(p => [p.id, p.url ? 'checking' : 'unknown']))
  );
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [activeSection, setActiveSection] = useState('producten');

  const checkHealth = useCallback(async () => {
    const pings = PRODUCTS.map(async (p) => {
      if (!p.url) return [p.id, 'unknown'];
      const status = await pingUrl(p.url);
      return [p.id, status];
    });
    const results = await Promise.all(pings);
    setStatuses(Object.fromEntries(results));
  }, []);

  useEffect(() => {
    checkHealth();
    const interval = setInterval(checkHealth, 60000);
    return () => clearInterval(interval);
  }, [checkHealth]);

  const onlineCount = Object.values(statuses).filter(s => s === 'up').length;
  const totalPingable = PRODUCTS.filter(p => p.url).length;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: 'var(--ro-licht-grijs)' }}>

      <header style={{ background: 'var(--ro-blauw)', color: 'white', flexShrink: 0 }}>
        <div style={{ background: '#0d2d4f', padding: '8px 40px', display: 'flex', alignItems: 'center', gap: 16 }}>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 284 60" width="142" height="30" style={{ flexShrink: 0 }}>
            <g fill="#F5C400">
              <rect x="0" y="18" width="4" height="28"/>
              <rect x="8" y="10" width="4" height="36"/>
              <rect x="16" y="4" width="4" height="42"/>
              <rect x="0" y="44" width="20" height="4"/>
              <circle cx="2" cy="18" r="3"/>
              <circle cx="10" cy="10" r="3"/>
              <circle cx="18" cy="4" r="3"/>
            </g>
            <text x="30" y="22" fontFamily="Arial, sans-serif" fontSize="13" fontWeight="700" fill="white">Rijksoverheid</text>
            <text x="30" y="40" fontFamily="Arial, sans-serif" fontSize="11" fill="rgba(255,255,255,0.75)">Ministerie van Financiën</text>
          </svg>
        </div>

        <div style={{ padding: '32px 40px 0', maxWidth: 1280, margin: '0 auto', width: '100%' }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
              <img src="icons/innovatieteam_logo.png" alt="Innovatieteam" style={{ width: 72, height: 72, objectFit: 'contain', flexShrink: 0 }}/>
              <div>
                <div style={{ fontSize: 13, opacity: 0.65, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6 }}>
                  Intern dashboard
                </div>
                <h1 style={{ fontSize: 36, fontWeight: 700, letterSpacing: -0.5 }}>Innovatieteam</h1>
                <p style={{ fontSize: 15, opacity: 0.8, marginTop: 4 }}>Innovatieve producten maken voor het Ministerie van Financiën</p>
              </div>
            </div>
            <div style={{
              background: 'rgba(255,255,255,0.1)', borderRadius: 4,
              padding: '12px 20px', textAlign: 'center', backdropFilter: 'blur(4px)',
            }}>
              <div style={{ fontSize: 28, fontWeight: 700 }}>{onlineCount}/{totalPingable}</div>
              <div style={{ fontSize: 12, opacity: 0.75 }}>tools online</div>
            </div>
          </div>

          <nav style={{ display: 'flex', gap: 0, marginTop: 28 }}>
            {['producten', 'team'].map(tab => (
              <button key={tab} onClick={() => setActiveSection(tab)} style={{
                padding: '12px 28px', background: 'transparent', border: 'none',
                color: activeSection === tab ? 'white' : 'rgba(255,255,255,0.6)',
                fontWeight: activeSection === tab ? 700 : 400,
                fontSize: 15, cursor: 'pointer', fontFamily: 'inherit',
                borderBottom: activeSection === tab ? '3px solid white' : '3px solid transparent',
                transition: 'all 0.15s',
                textTransform: 'capitalize',
              }}>
                {tab === 'producten' ? '⚡ Producten' : '👥 Wie zijn wij'}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main style={{ flex: 1, padding: '40px', maxWidth: 1280, margin: '0 auto', width: '100%' }}>

        {activeSection === 'producten' && (
          <div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28, flexWrap: 'wrap', gap: 12 }}>
              <div>
                <h2 style={{ fontSize: 22, fontWeight: 700, color: 'var(--ro-blauw)' }}>Onze producten</h2>
                <p style={{ fontSize: 14, color: '#666', marginTop: 2 }}>Klik op een product voor details en de link naar de tool</p>
              </div>
              <button onClick={checkHealth} style={{
                display: 'flex', alignItems: 'center', gap: 8,
                padding: '8px 16px', border: '1.5px solid var(--ro-licht-blauw)',
                background: 'white', color: 'var(--ro-licht-blauw)', borderRadius: 4,
                cursor: 'pointer', fontSize: 14, fontWeight: 600, fontFamily: 'inherit',
                transition: 'all 0.15s',
              }}
              onMouseEnter={e => { e.currentTarget.style.background = 'var(--ro-licht-blauw)'; e.currentTarget.style.color = 'white'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'white'; e.currentTarget.style.color = 'var(--ro-licht-blauw)'; }}
              >
                ↻ Status vernieuwen
              </button>
            </div>

            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
              gap: 20,
            }}>
              {PRODUCTS.map(p => (
                <ProductCard
                  key={p.id}
                  product={p}
                  status={statuses[p.id]}
                  onOpen={setSelectedProduct}
                />
              ))}
            </div>
          </div>
        )}

        {activeSection === 'team' && (
          <div>
            <div style={{ marginBottom: 32 }}>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: 'var(--ro-blauw)', marginBottom: 4 }}>Wie zijn wij</h2>
              <p style={{ fontSize: 14, color: '#666' }}>Het innovatieteam van het Ministerie van Financiën</p>
            </div>

            <div style={{
              background: 'var(--ro-blauw)', color: 'white',
              borderRadius: 4, padding: '32px 40px', marginBottom: 36,
              display: 'flex', alignItems: 'center', gap: 24,
            }}>
              <div style={{ fontSize: 48, flexShrink: 0 }}>💡</div>
              <div>
                <div style={{ fontSize: 12, textTransform: 'uppercase', letterSpacing: 1, opacity: 0.7, marginBottom: 8 }}>Onze missie</div>
                <div style={{ fontSize: 22, fontWeight: 700, lineHeight: 1.4 }}>
                  Innovatieve producten maken voor het Ministerie van Financiën
                </div>
                <div style={{ fontSize: 15, opacity: 0.8, marginTop: 8, lineHeight: 1.6 }}>
                  Wij ontwikkelen AI-tools en digitale oplossingen die medewerkers van het ministerie helpen slimmer en efficiënter te werken.
                </div>
              </div>
            </div>

            <div>
              <h3 style={{ fontSize: 16, fontWeight: 600, color: '#555', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 16 }}>
                Teamleden
              </h3>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 16 }}>
                {TEAM.map(m => <TeamMember key={m.id} member={m} />)}
                <div style={{
                  display: 'flex', alignItems: 'center', gap: 18,
                  background: 'white', borderRadius: 4, padding: '20px 24px',
                  boxShadow: '0 2px 8px rgba(0,0,0,0.06)',
                  border: '2px dashed #ddd', minWidth: 200,
                  cursor: 'pointer', color: '#aaa',
                }}>
                  <div style={{
                    width: 52, height: 52, borderRadius: '50%',
                    border: '2px dashed #ccc',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 22, flexShrink: 0,
                  }}>+</div>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600 }}>Teamlid toevoegen</div>
                    <div style={{ fontSize: 13, color: '#bbb' }}>Binnenkort</div>
                  </div>
                </div>
              </div>
            </div>

            <div style={{ marginTop: 48 }}>
              <h3 style={{ fontSize: 16, fontWeight: 600, color: '#555', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 16 }}>
                Onze producten op een rij
              </h3>
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                {PRODUCTS.map(p => (
                  <div key={p.id} onClick={() => { setActiveSection('producten'); setSelectedProduct(p); }}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 8,
                      background: 'white', border: '1.5px solid #e0e8f0',
                      borderRadius: 4, padding: '8px 14px',
                      cursor: 'pointer', transition: 'all 0.15s', fontSize: 14, fontWeight: 600, color: 'var(--ro-blauw)',
                    }}
                    onMouseEnter={e => { e.currentTarget.style.background = 'var(--ro-hemel)'; e.currentTarget.style.borderColor = 'var(--ro-licht-blauw)'; }}
                    onMouseLeave={e => { e.currentTarget.style.background = 'white'; e.currentTarget.style.borderColor = '#e0e8f0'; }}
                  >
                    <img src={p.icon} alt={p.name} style={{ width: 20, height: 20, objectFit: 'contain' }}/>
                    <span>{p.name}</span>
                    <StatusBadge status={statuses[p.id]} />
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </main>

      <footer style={{ background: '#0d2d4f', color: 'rgba(255,255,255,0.6)', padding: '16px 40px', fontSize: 13, display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
        <span>Innovatieteam — Ministerie van Financiën</span>
        <span>Status wordt elke 60 seconden bijgewerkt</span>
      </footer>

      {selectedProduct && (
        <ProductModal
          product={selectedProduct}
          status={statuses[selectedProduct.id]}
          onClose={() => setSelectedProduct(null)}
        />
      )}

      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(1.3); }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
